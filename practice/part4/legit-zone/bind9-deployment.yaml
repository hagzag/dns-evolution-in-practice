apiVersion: apps/v1
kind: Deployment
metadata:
  name: legit-zone-bind9
  namespace: legit-zone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: legit-zone-bind9
  template:
    metadata:
      labels:
        app: legit-zone-bind9
    spec:
      containers:
        - name: bind9
          image: internetsystemsconsortium/bind9:9.20
          args: ["-g", "-c", "/etc/bind/named.conf"]
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
          volumeMounts:
            - name: bind-config
              mountPath: /etc/bind/named.conf
              subPath: named.conf
            - name: bind-config
              mountPath: /etc/bind/zones/db.lab.dns
              subPath: db.lab.dns
      volumes:
        - name: bind-config
          configMap:
            name: legit-zone-bind-config
---
apiVersion: v1
kind: Service
metadata:
  name: legit-zone-dns
  namespace: legit-zone
spec:
  selector:
    app: legit-zone-bind9
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP

apiVersion: v1
kind: ConfigMap
metadata:
  name: attacker-scripts
  namespace: attacker
data:
  forge_response.py: |
    #!/usr/bin/env python3
    """Educational use only: validates target constraints and exits safely."""

    from __future__ import annotations

    import argparse
    import ipaddress
    import sys


    def is_private_or_lab(value: str) -> bool:
      if value.endswith(".lab.dns"):
        return True
      if value.endswith(".svc.cluster.local"):
        return True
      try:
        ip = ipaddress.ip_address(value)
      except ValueError:
        return False
      return ip.is_private


    def main() -> int:
      parser = argparse.ArgumentParser()
      parser.add_argument("--target", required=True)
      parser.add_argument("--qname", default="bank.lab.dns")
      args = parser.parse_args()

      if not is_private_or_lab(args.target):
        print("Refusing to run: target must be private IP or *.lab.dns", file=sys.stderr)
        return 2

      if not args.qname.endswith(".lab.dns"):
        print("Refusing to run: qname must be in .lab.dns", file=sys.stderr)
        return 2

      print("Educational use only.")
      print(f"Validated target={args.target} qname={args.qname}")
      print("No packets sent. This script is intentionally non-transmitting.")
      return 0


    if __name__ == "__main__":
      raise SystemExit(main())
  inspect_forged_packet.py: |
    #!/usr/bin/env python3
    """Educational use only: inspect a forged DNS response in memory."""

    from __future__ import annotations

    import struct


    def build_packet() -> bytes:
      txid = 0xBEEF
      flags = 0x8180
      qdcount = 1
      ancount = 1
      nscount = 0
      arcount = 0

      header = struct.pack("!HHHHHH", txid, flags, qdcount, ancount, nscount, arcount)

      qname = b"\x04bank\x03lab\x03dns\x00"
      question = qname + struct.pack("!HH", 1, 1)

      answer_name_ptr = struct.pack("!H", 0xC00C)
      answer_meta = struct.pack("!HHIH", 1, 1, 60, 4)
      answer_rdata = bytes([10, 255, 255, 254])

      return header + question + answer_name_ptr + answer_meta + answer_rdata


    def main() -> None:
      packet = build_packet()
      txid, flags, qd, an, ns, ar = struct.unpack("!HHHHHH", packet[:12])

      print("Educational use only.")
      print("Forged DNS response anatomy (in memory only):")
      print(f"  transaction_id: 0x{txid:04x}")
      print(f"  flags: 0x{flags:04x}")
      print(f"  question_count: {qd}")
      print(f"  answer_count: {an}")
      print(f"  authority_count: {ns}")
      print(f"  additional_count: {ar}")
      print("  question_name: bank.lab.dns")
      print("  answer_type: A")
      print("  answer_ip: 10.255.255.254")
      print("  rrsig_present: no")


    if __name__ == "__main__":
      main()

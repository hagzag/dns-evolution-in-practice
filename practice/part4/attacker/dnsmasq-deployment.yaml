apiVersion: apps/v1
kind: Deployment
metadata:
  name: attacker-dns
  namespace: attacker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attacker-dns
  template:
    metadata:
      labels:
        app: attacker-dns
    spec:
      containers:
        - name: dnsmasq
          image: jpillora/dnsmasq:latest
          args: ["-k", "--conf-file=/etc/dnsmasq/dnsmasq.conf"]
          ports:
            - containerPort: 53
              protocol: UDP
            - containerPort: 53
              protocol: TCP
          volumeMounts:
            - name: dnsmasq-config
              mountPath: /etc/dnsmasq/dnsmasq.conf
              subPath: dnsmasq.conf
        - name: tools
          image: python:3.12-alpine
          command: ["/bin/sh", "-lc", "sleep infinity"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: dnsmasq-config
          configMap:
            name: attacker-dnsmasq-config
        - name: scripts
          configMap:
            name: attacker-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: attacker-dns
  namespace: attacker
spec:
  selector:
    app: attacker-dns
  ports:
    - name: dns-udp
      port: 53
      targetPort: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      targetPort: 53
      protocol: TCP
